{% extends "base.html" %}
{% block title %}Estimation gratuite{% endblock %}
{% block content %}
<section class="card">
  <h1>Estimateur immobilier gratuit</h1>
  <form hx-post="/estimate" hx-target="#estimate-result" hx-swap="innerHTML">
    <label>Ville <input type="text" name="city" required></label>
    <label>Type de bien
      <select name="property_type">
        <option>Appartement</option>
        <option>Maison</option>
      </select>
    </label>
    <label>Surface (m²) <input type="number" step="0.1" name="area_sqm" required></label>
    <label>Nombre de pièces <input type="number" name="rooms" required></label>
    <button type="submit">Estimer</button>
  </form>
</section>
<section id="estimate-result"></section>
{% endblock %}
